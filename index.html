<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Data Viewer</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            padding: 20px; 
            background-color: #f4f4f9; 
        }
        .container { 
            max-width: 600px; 
            margin: auto; 
            background: white; 
            padding: 20px; 
            border-radius: 8px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
        }
        h2 { 
            text-align: center; 
            color: #333; 
        }
        #data-container { 
            margin-top: 20px; 
            padding: 15px; 
            border: 1px solid #ddd; 
            border-radius: 4px; 
            background: #fafafa; 
            min-height: 100px; 
            word-wrap: break-word;
        }
        .data-item { 
            padding: 10px; 
            border-bottom: 1px solid #eee; 
            margin-bottom: 10px;
        }
        .data-item:last-child { 
            border-bottom: none; 
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Firebase ডেটা ভিউয়ার</h2>
    <div id="data-container">ডেটা লোড হচ্ছে... অনুগ্রহ করে অপেক্ষা করুন।</div>
</div>

<script type="module">
  // Firebase core এবং Analytics ইম্পোর্ট
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js";
  
  // ডেটা দেখার জন্য Firestore Database ইম্পোর্ট
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // আপনার দেওয়া ফায়ারবেস কনফিগারেশন
  const firebaseConfig = {
    apiKey: "AIzaSyAwS7AZewx0L8KRGeFXB7Jq4BJEbSB0xO0",
    authDomain: "fxgroup-5dd7c.firebaseapp.com",
    projectId: "fxgroup-5dd7c",
    storageBucket: "fxgroup-5dd7c.firebasestorage.app",
    messagingSenderId: "982128077012",
    appId: "1:982128077012:web:e5088b7be662cecf20f341",
    measurementId: "G-9FRXZNCJQJ"
  };

  // ফায়ারবেস ইনিশিয়ালাইজ করুন
  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  
  // Firestore ডেটাবেস ইনিশিয়ালাইজ করুন
  const db = getFirestore(app);

  // ডেটা ফেচ করে ওয়েবসাইটে দেখানোর ফাংশন
  async function fetchFirebaseData() {
    const dataContainer = document.getElementById('data-container');
    
    try {
      // ⚠️ এখানে "myCollection" এর জায়গায় আপনার ফায়ারবেস ডাটাবেসের আসল কালেকশনের নাম দিন
      const querySnapshot = await getDocs(collection(db, "myCollection")); 
      
      dataContainer.innerHTML = ""; // লোডিং টেক্সট সরিয়ে দেওয়া
      
      if(querySnapshot.empty) {
          dataContainer.innerHTML = "<p>কোনো ডেটা পাওয়া যায়নি। দয়া করে কালেকশনের নাম চেক করুন অথবা ফায়ারবেসে ডেটা যুক্ত করুন।</p>";
          return;
      }

      // ডাটাবেস থেকে পাওয়া প্রতিটি ডেটা স্ক্রিনে দেখানো
      querySnapshot.forEach((doc) => {
        const div = document.createElement("div");
        div.className = "data-item";
        // ডেটার ID এবং সম্পূর্ণ ডেটা JSON ফরম্যাটে শো করানো
        div.innerHTML = `<strong>Document ID:</strong> ${doc.id} <br><br> <strong>Data:</strong> ${JSON.stringify(doc.data())}`;
        dataContainer.appendChild(div);
      });

    } catch (error) {
      console.error("Error fetching data: ", error);
      dataContainer.innerHTML = `
        <p style="color:red;">ডেটা লোড করতে সমস্যা হয়েছে।</p>
        <p><b>ত্রুটি:</b> ${error.message}</p>
        <p><small>বিঃদ্রঃ আপনার ফায়ারবেস কনসোল থেকে Firestore Database-এর Security Rules এ 'read' পারমিশন দেওয়া আছে কিনা তা চেক করুন।</small></p>
      `;
    }
  }

  // ফাংশনটি কল করা
  fetchFirebaseData();
</script>

</body>
</html>
